<svg width="760" height="940" viewBox="0 0 760 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stage Workflow Sample Diagram</title>
  <desc id="desc">A compact README-friendly workflow diagram for the stage-workflow repository showing setup, validation, and deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="76" y1="54" x2="684" y2="886" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F3EA"/>
      <stop offset="1" stop-color="#EEF4F6"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#153B50"/>
      <stop offset="1" stop-color="#245B62"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173042" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M1 1L7.5 4.5L1 8" stroke="#3D5969" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 22px Georgia, "Times New Roman", serif; fill: #F8FBFC; }
      .subtitle { font: 400 11px "Trebuchet MS", Verdana, sans-serif; fill: #DCEAED; }
      .lane-title { font: 700 12px "Trebuchet MS", Verdana, sans-serif; fill: #183746; letter-spacing: 0.06em; }
      .card-title { font: 700 13px "Trebuchet MS", Verdana, sans-serif; fill: #153242; }
      .card-body { font: 400 11px "Trebuchet MS", Verdana, sans-serif; fill: #284A58; }
      .mini { font: 600 10px "Trebuchet MS", Verdana, sans-serif; fill: #486675; letter-spacing: 0.08em; }
      .small { font: 400 9px "Trebuchet MS", Verdana, sans-serif; fill: #4A6773; }
      .line { stroke: #3D5969; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .soft-line { stroke: #67818A; stroke-width: 1.4; stroke-linecap: round; stroke-dasharray: 5 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="760" height="940" rx="18" fill="url(#bg)"/>
  <rect x="30" y="22" width="700" height="78" rx="18" fill="url(#header)"/>
  <text x="50" y="58" class="title">stage-workflow sample visual</text>
  <text x="50" y="79" class="subtitle">High-level flow for setup, feature validation, and merged PR deployment.</text>

  <rect x="34" y="118" width="692" height="132" rx="18" fill="#F3E7CB" stroke="#D6C391"/>
  <text x="54" y="142" class="lane-title">FOUNDATION</text>

  <rect x="54" y="160" width="150" height="46" rx="12" fill="#FFF9EB" stroke="#C9B47D"/>
  <text x="72" y="182" class="mini">setup_script.py</text>
  <text x="72" y="196" class="small">(Create Git Repo)</text>

  <rect x="214" y="154" width="140" height="56" rx="14" fill="#FFFDF7" stroke="#D1BE91" filter="url(#shadow)"/>
  <text x="232" y="176" class="card-title">Add Secrets</text>
  <text x="232" y="194" class="card-body">design + auto keys</text>

  <rect x="386" y="154" width="148" height="56" rx="14" fill="#FFFDF7" stroke="#D1BE91" filter="url(#shadow)"/>
  <text x="404" y="176" class="card-title">Init DSS Project</text>
  <text x="404" y="194" class="card-body">connect Git</text>

  <rect x="566" y="154" width="124" height="56" rx="14" fill="#FFFDF7" stroke="#D1BE91" filter="url(#shadow)"/>
  <text x="584" y="176" class="card-title">Work in Branch</text>
  <text x="584" y="194" class="card-body">develop + push</text>

  <path d="M204 183H214" class="line"/>
  <path d="M354 183H386" class="line"/>
  <path d="M534 183H566" class="line"/>

  <rect x="34" y="272" width="692" height="254" rx="18" fill="#E8F4F2" stroke="#B6D4CE"/>
  <text x="54" y="296" class="lane-title">PATH A · FEATURE BRANCH VALIDATION (DE Workflow)</text>

  <rect x="68" y="346" width="152" height="62" rx="16" fill="#F8FEFD" stroke="#A9CEC6" filter="url(#shadow)"/>
  <text x="78" y="367" class="card-title">Develop Project</text>
  <text x="78" y="384" class="card-title">and Push Branch</text>
  <text x="86" y="401" class="card-body">non-master push</text>

  <rect x="262" y="346" width="152" height="62" rx="16" fill="#F8FEFD" stroke="#A9CEC6" filter="url(#shadow)"/>
  <text x="280" y="371" class="card-title">GitHub Action</text>
  <text x="280" y="389" class="card-body">workflow starts</text>

  <rect x="456" y="346" width="152" height="62" rx="16" fill="#F8FEFD" stroke="#A9CEC6" filter="url(#shadow)"/>
  <text x="458" y="371" class="card-title">Validate Project Run</text>
  <text x="474" y="389" class="card-body">quality check</text>

  <rect x="262" y="446" width="152" height="62" rx="16" fill="#F8FEFD" stroke="#A9CEC6" filter="url(#shadow)"/>
  <text x="280" y="471" class="card-title">Send Result</text>
  <text x="280" y="489" class="card-body">success / failure</text>

  <path d="M220 377H262" class="line"/>
  <path d="M414 377H456" class="line"/>
  <path d="M532 408V426H338V446" class="line"/>

  <rect x="34" y="550" width="692" height="330" rx="18" fill="#EEF0FB" stroke="#C9CDED"/>
  <text x="54" y="574" class="lane-title">PATH B · MERGED PR DEPLOYMENT (DS Workflow)</text>

  <rect x="68" y="626" width="152" height="62" rx="16" fill="#FBFCFF" stroke="#BEC4E6" filter="url(#shadow)"/>
  <text x="86" y="651" class="card-title">Close PR</text>
  <text x="86" y="669" class="card-body">target: master</text>

  <rect x="262" y="626" width="152" height="62" rx="16" fill="#FBFCFF" stroke="#BEC4E6" filter="url(#shadow)"/>
  <text x="280" y="651" class="card-title">Check Merge</text>
  <text x="280" y="669" class="card-body">merged or not</text>

  <rect x="456" y="626" width="152" height="62" rx="16" fill="#FBFCFF" stroke="#BEC4E6" filter="url(#shadow)"/>
  <text x="474" y="651" class="card-title">Re-Validate</text>
  <text x="474" y="669" class="card-body">run scenario</text>

  <rect x="170" y="726" width="168" height="68" rx="16" fill="#FBFCFF" stroke="#BEC4E6" filter="url(#shadow)"/>
  <text x="188" y="752" class="card-title">Deploy Bundle</text>
  <text x="188" y="770" class="card-body">export, publish, update</text>

  <rect x="424" y="726" width="168" height="68" rx="16" fill="#FBFCFF" stroke="#BEC4E6" filter="url(#shadow)"/>
  <text x="442" y="752" class="card-title">Confirm + Notify</text>
  <text x="442" y="770" class="card-body">healthy deploy, email</text>

  <path d="M220 657H262" class="line"/>
  <path d="M414 657H456" class="line"/>
  <path d="M532 688V708H254V726" class="line"/>
  <path d="M338 760H424" class="line"/>
  <path d="M338 688V704H646V764" class="soft-line"/>
  <text x="620" y="704" class="small">not merged</text>
  <text x="652" y="776" class="small">no action</text>

  <rect x="34" y="898" width="692" height="18" rx="9" fill="#D9E6E8"/>
  <text x="48" y="911" class="small">Based on README, GitHub Actions workflow, setup script, helper script, and scenario config.</text>
</svg>
